name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC site
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build documentation
        run: |
          swift package --allow-writing-to-directory ./docs-site \
            generate-documentation \
            --target CommandPaletteKit \
            --include-extended-types \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path CommandPaletteKit \
            --output-path ./docs-site
      - name: Redirect site root to the documentation landing page
        run: |
          cat > ./docs-site/index.html <<'HTML'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=/CommandPaletteKit/documentation/commandpalettekit">
          <link rel="canonical" href="/CommandPaletteKit/documentation/commandpalettekit">
          <title>CommandPaletteKit</title>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
