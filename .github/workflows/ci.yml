name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same pull request, but never cancel a push
# to main: pushes have no `head_ref`, so they fall back to the unique
# `run_id` and each gets its own concurrency group. This stops the slow iOS
# Simulator job from being marked failed when several pushes land close
# together. See issue #8.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict

  macos:
    name: Build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  ios:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build & test on iOS Simulator
        run: |
          xcodebuild test \
            -scheme CommandPaletteKit \
            -destination 'platform=iOS Simulator,name=iPhone 16'
